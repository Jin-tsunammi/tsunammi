        example: "1234567890"
        type: string
    type: object
host: https://api-stage.tsunammi.io/
info:
  contact: {}
  description: This is the swagger specification for Tsunammi API.
  title: Tsunammi API
  version: 0.0.7
paths:
  /accounts:
    get:
      description: Returns all exchange accounts for the authenticated user.
      operationId: get-accounts-by-user
      parameters:
      - description: Authentication token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.AccountResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      security:
      - BearerAuth: []
      summary: Get all accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Creates a new exchange account
      operationId: add-exchange-account
      parameters:
      - description: Authentication token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Payload to create an account
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/model.AddExchangeAccountReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      security:
      - BearerAuth: []
      summary: Create exchange account
      tags:
      - accounts
  /accounts/{id}:
    delete:
      description: Deletes a specific exchange account by its ID, for the authenticated
        user.
      operationId: delete-account-by-id
      parameters:
      - description: Authentication token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request (invalid ID)
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      security:
      - BearerAuth: []
      summary: Delete account by ID
      tags:
      - accounts
    get:
      description: Returns a specific exchange account by its ID, for the authenticated
        user.
      operationId: get-account-by-id
      parameters:
      - description: Authentication token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AccountResponse'
        "400":
          description: Bad Request (invalid ID)
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      security:
      - BearerAuth: []
      summary: Get account by ID
      tags:
      - accounts
  /auth/refresh:
    post:
      description: Refreshes the access and refresh token pair using an existing refresh
        token.
      parameters:
      - description: Authentication token (Refresh Token)
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Tokens successfully refreshed
          schema:
            $ref: '#/definitions/auth.TokenPair'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/apperrors.AppError'
      security:
      - BearerAuth: []
      summary: Refresh JWT tokens
      tags:
      - auth
  /auth/send-code:
    post:
      consumes:
      - application/json
      description: Generates and sends a one-time code to the specified email address.
      parameters:
      - description: Send Code Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SendCode'
      responses:
        "200":
          description: Code sent successfully
        "400":
          description: Bad Request or invalid email format
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Send confirmation code
      tags:
      - auth
  /auth/sign-in-email:
    post:
      consumes:
      - application/json
      description: Authenticates a user with an email and code, returning JWT access
        and refresh tokens.
      parameters:
      - description: Sign In Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SignInWithEmail'
      produces:
      - application/json
      responses:
        "200":
          description: Successful sign-in. Returns a user object and JWT info
          schema:
            $ref: '#/definitions/model.SignInResp'
        "400":
          description: Bad Request or invalid email format
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "401":
          description: Invalid confirmation code
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "404":
          description: User with this email not found
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Sign in via email
      tags:
      - auth
  /auth/sign-in-google:
    post:
      description: Authenticates an existing user via a Google ID token and returns
        JWT tokens.
      parameters:
      - description: Authentication token (Google ID Token)
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful sign-in. Returns a user object and JWT info
          schema:
            $ref: '#/definitions/model.SignInResp'
        "400":
          description: Email is missing from locals
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "401":
          description: Google authentication error
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Sign in via Google
      tags:
      - auth
  /auth/sign-in-wallet:
    post:
      consumes:
      - application/json
      description: Authenticates a user by verifying a signed message from their Solana
        wallet. If the user does not exist, a new one is created.
      operationId: sign-in-with-wallet
      parameters:
      - description: Public key and signed message(public key) for verification
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SolanaVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successful sign-in or registration. Returns user data and JWT
            tokens
          schema:
            $ref: '#/definitions/model.SignInResp'
        "400":
          description: Bad Request (e.g., missing public key or signature)
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "401":
          description: Unauthorized (invalid wallet signature)
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Sign in or register with Solana wallet
      tags:
      - auth
  /auth/sign-up-email:
    post:
      consumes:
      - application/json
      description: Creates a new user by verifying an email and confirmation code.
      parameters:
      - description: Sign Up Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SignUpWithEmail'
      responses:
        "200":
          description: User successfully created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "401":
          description: Invalid confirmation code
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error (e.g., user already exists)
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Sign up via email
      tags:
      - auth
  /auth/sign-up-google:
    post:
      description: Creates a new user based on a Google ID token.
      parameters:
      - description: Authentication token (Google ID Token)
        in: header
        name: Authorization
        required: true
        type: string
      responses:
        "200":
          description: User successfully created
        "401":
          description: Email not found in locals or invalid token
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error (e.g., user already exists)
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Sign up via Google
      tags:
      - auth
  /buyback:
